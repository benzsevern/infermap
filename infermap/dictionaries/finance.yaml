# Finance domain dictionary — banking, payments, accounting, trading.
#
# Scope: accounts, transactions, counterparties, instruments, ledger
# postings. Modeled on ISO 20022 message fields plus common core banking
# and accounting system conventions.
#
# Sources consulted:
#   - ISO 20022 (pain, pacs, camt message families)
#   - FpML (financial products markup)
#   - Common general-ledger column names (SAP, Oracle EBS, NetSuite)

