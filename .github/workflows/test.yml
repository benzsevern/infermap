name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest --cov=infermap --cov-report=xml --tb=short -q
      - uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check infermap/ tests/

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install from wheel
        run: |
          pip install build
          python -m build
          pip install dist/*.whl

      - name: Smoke test
        run: infermap --help

  infermap-js:
    # TypeScript port: full build + typecheck + test + parity.
    # Parity requires Python to regenerate goldens first so drift is caught.
    runs-on: ubuntu-latest
    env:
      # Opt into Node.js 24 for JavaScript actions (actions/checkout,
      # actions/setup-node). Node 20 support in runners ends Sept 2026.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python package (for parity goldens)
        run: pip install -e ".[dev]"

      - name: Regenerate parity goldens
        run: python scripts/gen_parity_goldens.py

      - name: Verify goldens unchanged (detects Python drift)
        run: git diff --exit-code tests/fixtures/_goldens/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS package
        working-directory: packages/infermap-js
        run: npm install

      - name: Typecheck
        working-directory: packages/infermap-js
        run: npm run typecheck

      - name: Test (includes parity suite)
        working-directory: packages/infermap-js
        run: npm run test

      - name: Build
        working-directory: packages/infermap-js
        run: npm run build
